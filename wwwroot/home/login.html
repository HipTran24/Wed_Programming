<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Đăng nhập — AI Study</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  link href="../css/Style.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-glass py-3">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="index.html">AI Study</a>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-light" href="register.html">Đăng ký</a>
        </div>
      </div>
    </nav>

   <main class="auth-page">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="glass p-4">         
            <h3 class="fw-bold mb-2">Đăng nhập</h3>
            <p class="text-muted-2">
              Đăng nhập để lưu lịch sử, tuỳ chỉnh đề, xem phân tích học tập.
            </p>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input
                class="form-control"
                placeholder="name@email.com"
                type="email"
              />
            </div>
            <div class="mb-3">
              <label class="form-label">Mật khẩu</label>
              <input
                class="form-control"
                placeholder="••••••••"
                type="password"
              />
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember" />
                <label class="form-check-label" for="remember"
                  >Ghi nhớ đăng nhập</label
                >
              </div>
              <a class="text-muted-2" href="#">Quên mật khẩu?</a>
            </div>

            <button class="btn btn-primary w-100">Đăng nhập</button>
            <div class="text-muted-2 small mt-3">
              Chưa có tài khoản?
              <a href="register.html" class="text-white">Đăng ký</a>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      © 2026 AI Study
  </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
